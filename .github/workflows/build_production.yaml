name: Build site and deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true 
          fetch-depth: 0  

      - name: Set env parameters
        run: |
          hugovr=$(cat .hugo_version)
          echo "hugovr=$hugovr" >> $GITHUB_ENV

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.hugovr }}
          extended: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install theme dependencies
        run: npm install --prefix themes/capro-tw

      - name: Build 🔧
        env:
          HUGO_GMAP_API: ${{ secrets.HUGO_GMAP_API }}
        run: hugo --minify

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public 