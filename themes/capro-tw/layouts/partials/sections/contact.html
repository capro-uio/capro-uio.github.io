{{ with site.Params.contact }}
<section class="section bg-grey" id="contact">
  <div class="max-w-5xl mx-auto px-4">
    <div class="section-title reveal">
      <h2>{{ with .title }}{{ index (split . " ") 0 | safeHTML }}{{ end }} <span class="accent">{{ with .title }}{{ after (len (index (split . " ") 0)) . | safeHTML }}{{ end }}</span></h2>
      <div class="border-accent"></div>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
      <div class="reveal">
        <div class="font-serif text-lg mb-8">
          {{ .content | markdownify }}
        </div>
      </div>
      <div class="reveal space-y-6">
        {{ range .item }}
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 flex items-center justify-center rounded-full flex-shrink-0" style="border: 1px solid var(--color-border);">
            <i class="{{ .icon }} text-primary text-sm" aria-hidden="true"></i>
          </div>
          <div class="text-sm font-serif">{{ .info | markdownify }}</div>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
{{ end }}
