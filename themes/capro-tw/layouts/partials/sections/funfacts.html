{{ with .Site.GetPage "section" "funfacts" }}
{{ if gt (.Params.item | len) 0 }}
{{ range first 1 (.Resources.ByType "image") }}
<section id="counter" class="relative py-28 bg-cover bg-center" style='background-image: url("{{ .RelPermalink }}")'>
  <div class="absolute inset-0 bg-black/50"></div>
{{ end }}
  <div class="relative max-w-4xl mx-auto px-4">
    <div class="flex flex-wrap justify-center gap-8">
      {{ range .Params.item }}
      <div class="text-center reveal">
        <div class="counter-card">
          <i class="{{ .icon }}"></i>
          <div class="counter-value" data-count="{{ .count }}">0</div>
          <h3>{{ .title | markdownify }}</h3>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
{{ end }}
