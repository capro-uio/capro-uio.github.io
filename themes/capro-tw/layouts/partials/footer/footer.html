<div class="footer-waves" aria-hidden="true">
  <svg viewBox="0 0 1440 120" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0,90 C240,30 480,110 720,60 C960,10 1200,80 1440,50" fill="none" stroke="#c04545" stroke-width="2" opacity="0.35"/>
    <path d="M0,70 C200,110 440,20 720,80 C1000,140 1240,40 1440,70" fill="none" stroke="#c04545" stroke-width="2" opacity="0.5"/>
    <path d="M0,50 C300,90 500,30 720,70 C940,110 1140,50 1440,90" fill="none" stroke="#E57575" stroke-width="2" opacity="0.4"/>
    <path d="M0,100 C180,60 420,100 720,40 C1020,80 1260,30 1440,60" fill="none" stroke="#c04545" stroke-width="2.5" opacity="0.6"/>
    <path d="M0,80 C260,40 500,90 720,50 C940,10 1180,70 1440,40" fill="none" stroke="#E57575" stroke-width="1.5" opacity="0.3"/>
  </svg>
</div>
<footer class="pt-6 pb-12" style="background-color: var(--color-dark);">
  <div class="max-w-7xl mx-auto px-4 text-center">
    <div class="flex justify-center gap-4 mb-8">
      {{ range site.Params.social }}
        <a href="{{ .link | safeURL }}" class="footer-social-icon"
           aria-label="{{ index (split .icon "-") (sub (len (split .icon "-")) 1) }}">
          <i class="{{ .icon }}" aria-hidden="true"></i>
        </a>
      {{ end }}
    </div>
    <a href="{{ site.Home.Permalink }}">
      {{ with resources.GetMatch site.Params.logo }}
        <img src="{{ .Permalink }}" alt="{{ site.Title }}" height="42" class="h-10 mx-auto mb-6">
      {{ end }}
    </a>
    <p class="text-sm text-light">{{ site.Params.copyright | markdownify }}</p>
  </div>
</footer>

<button x-data="{ show: false }"
        @scroll.window="show = (window.scrollY > 600)"
        x-show="show" x-transition x-cloak
        @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
        aria-label="Back to top"
        class="fixed bottom-5 right-5 w-10 h-10 flex items-center justify-center bg-dark border border-border hover:bg-primary hover:border-primary transition-all z-40">
  <i class="fa-solid fa-chevron-up" aria-hidden="true"></i>
</button>
